<div class="login-container">
  <div class="login-card">
    
    <div class="login-header">
      <h1>☀️ SolarIQ</h1>
      <p>{{ isRegister ? 'Create your account' : 'Sign in to your account' }}</p>
    </div>

    <div *ngIf="error" class="error-msg">⚠️ {{ error }}</div>

    <div class="form">
      
      <div *ngIf="isRegister" class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" placeholder="Fatima Sagheer"/>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="fatima@example.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••"/>
      </div>

      <button class="submit-btn" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Please wait...' : (isRegister ? 'Register' : 'Login') }}
      </button>

    </div>

    <p class="toggle-text">
      {{ isRegister ? 'Already have an account?' : "Don't have an account?" }}
      <span (click)="toggle()">
        {{ isRegister ? 'Sign in' : 'Register' }}
      </span>
    </p>

  </div>
</div>
