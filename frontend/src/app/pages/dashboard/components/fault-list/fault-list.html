<div class="fault-container">
  <h2 class="fault-title">⚠️ Active Fault Alerts</h2>

  <div *ngIf="loading" class="skeleton"></div>

  <div *ngIf="!loading && faults.length === 0" class="no-faults">
    ✅ No active faults — all systems running normally
  </div>

  <div *ngIf="!loading && faults.length > 0" class="fault-list">
    <div *ngFor="let fault of faults" class="fault-card" [ngClass]="getSeverityClass(fault.severity)">
      
      <div class="fault-header">
        <span class="fault-type">{{ fault.type | titlecase }}</span>
        <span class="fault-severity" [ngClass]="getSeverityClass(fault.severity)">
          {{ fault.severity | uppercase }}
        </span>
      </div>

      <div class="fault-body">
        <div class="fault-info">
          <span>🏭 {{ fault.systemId?.name || 'Unknown System' }}</span>
          <span>📍 {{ fault.systemId?.city || 'Unknown City' }}</span>
          <span>💬 {{ fault.message }}</span>
          <span>🕒 {{ fault.detectedAt | date:'short' }}</span>
        </div>

        <button class="resolve-btn" (click)="resolveFault(fault._id)">
          ✅ Resolve
        </button>
      </div>

    </div>
  </div>
</div>
